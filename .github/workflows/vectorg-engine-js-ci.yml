name: VectorG Engine JS CI

on:
    push:
        branches: [master]
    pull_request:
        branches: [master]
    workflow_dispatch:

env:
    CARGO_TERM_COLOR: always

jobs:
    check-fmt:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: "22.x"
            - run: npm ci
            - name: Check formatting
              run: npm run fmt -- --check
            - name: Check Rust formatting
              run: cargo fmt -- --check
    build:
        strategy:
            matrix:
                os: [ubuntu-latest, macos-latest]
        runs-on: ${{ matrix.os }}
        env:
            RUSTFLAGS: -D warnings
        steps:
            - uses: actions/checkout@v4
            - uses: actions/cache@v3
              with:
                  path: |
                      ~/.cargo/bin/
                      ~/.cargo/registry/index/
                      ~/.cargo/registry/cache/
                      ~/.cargo/git/db/
                      target/
                  key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
            - run: npm ci;
            - name: Prepare no-compat builds
              run: |
                  ./builds/prepare_builds/prepare_all_projects.sh
            - name: Build all no-compat projects
              run: |
                  ./builds/prepare_builds/build_all_projects.sh
            - name: Install wabt
              run: sudo apt install wabt
              if: matrix.os == 'ubuntu-latest'
            - name: Install wabt
              run: brew install wabt
              if: matrix.os == 'macos-latest'
            - name: Check 2D SIMD build
              run: |
                  wasm-objdump -d builds/vectorg-engine-2d-simd/pkg/vectorg_engine_wasm2d_bg.wasm | grep :\\sfd
            - name: Check 3D SIMD build
              run: |
                  wasm-objdump -d builds/vectorg-engine-3d-simd/pkg/vectorg_engine_wasm3d_bg.wasm | grep :\\sfd
            - uses: actions/upload-artifact@v4
              with:
                  name: pkg no-compat ${{ matrix.os }}
                  path: builds/*/pkg
                  overwrite: true
            - name: Upload documentation for GitHub Pages
              if: matrix.os == 'ubuntu-latest'
              uses: actions/upload-pages-artifact@v3
              with:
                  path: builds/vectorg-engine-3d/docs
    deploy-docs:
        runs-on: ubuntu-latest
        needs: [build]
        if: github.ref == 'refs/heads/master'
        permissions:
            pages: write
            id-token: write
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        steps:
            - name: Deploy VectorG Engine JS documentation
              id: deployment
              uses: actions/deploy-pages@v4
    build-compat:
        strategy:
            matrix:
                os: [ubuntu-latest, macos-latest]
        runs-on: ${{ matrix.os }}
        env:
            RUSTFLAGS: -D warnings
        steps:
            - uses: actions/checkout@v4
            - uses: actions/cache@v3
              with:
                  path: |
                      ~/.cargo/bin/
                      ~/.cargo/registry/index/
                      ~/.cargo/registry/cache/
                      ~/.cargo/git/db/
                      target/
                  key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
            - run: npm ci
            - name: Prepare compat builds
              run: ./builds/prepare_builds/prepare_all_projects.sh
            - name: Build vectorg-engine-compat
              run: |
                  cd vectorg-engine-compat
                  npm ci
                  npm run build
                  npm run test
            - name: Upload compat packages
              uses: actions/upload-artifact@v4
              with:
                  name: pkg compat ${{ matrix.os }}
                  path: vectorg-engine-compat/builds/*/pkg
                  overwrite: true
    publish:
        runs-on: ubuntu-latest
        needs: [build, build-compat]
        if: github.ref == 'refs/heads/master'
        steps:
            - uses: actions/checkout@v4
            - uses: actions/download-artifact@v4
              with:
                  name: pkg no-compat ubuntu-latest
                  path: builds
            - uses: actions/download-artifact@v4
              with:
                  name: pkg compat ubuntu-latest
                  path: vectorg-engine-compat/builds
            - uses: actions/setup-node@v4
              with:
                  node-version: "22.x"
                  registry-url: "https://registry.npmjs.org"
            - name: Publish projects
              run: |
                  ./publish_all_canary.sh
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
